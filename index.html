<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aisovereign.ai is For Sale | Premium AI Domain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, textarea {
            background-color: #121212 !important;
            border: 1px solid #222 !important;
            color: white !important;
        }
        input:focus, textarea:focus { border-color: #ffffff !important; outline: none; }
        .logo-crop { object-view-box: inset(15% 10% 15% 10%); }
    </style>
</head>
<body class="antialiased">

    <main class="hero-gradient min-h-screen flex flex-col items-center justify-center px-6 py-20">
        <img src="logo.jpg" alt="AI Sovereign Logo" 
            class="logo-crop h-32 md:h-44 w-auto object-contain mb-8 rounded-3xl brightness-110 shadow-[0_0_50px_rgba(255,255,255,0.05)]">

        <div class="inline-block px-4 py-1.5 rounded-full border border-purple-500/30 bg-purple-500/10 text-purple-400 text-xs font-bold tracking-[0.2em] uppercase mb-6">
            Premium Asset Available
        </div>

        <h1 class="text-6xl md:text-9xl font-extrabold tracking-tighter text-center mb-6">
            aisovereign<span class="text-gray-500">.ai</span>
        </h1>
        
        <p class="max-w-2xl text-lg md:text-xl text-gray-400 text-center leading-relaxed mb-12 font-light">
            An elite digital identity for autonomous systems and AI governance. 
            <span class="block mt-2 text-white font-medium italic">Now accepting acquisition offers.</span>
        </p>

        <div class="glass-card w-full max-w-lg p-8 md:p-10 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center text-white">Submit Offer</h2>
            
            <form action="https://formspree.io/f/mojklerv" method="POST" class="space-y-5">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2 ml-1">Full Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-4 rounded-xl transition">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2 ml-1">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-4 rounded-xl transition">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2 ml-1">Acquisition Offer / Inquiry</label>
                    <textarea name="message" rows="4" required class="w-full px-4 py-4 rounded-xl transition" placeholder="Enter USD offer or questions..."></textarea>
                </div>
                <button type="submit" class="w-full bg-white text-black font-extrabold py-5 rounded-xl hover:bg-gray-200 transition shadow-xl text-lg uppercase tracking-widest">
                    Send Inquiry
                </button>
            </form>
            
            <div class="mt-8 text-center pt-6 border-t border-white/5">
                <p class="text-[10px] text-gray-600 uppercase tracking-widest mb-2">Direct Channel</p>
                <a href="mailto:john.kelly@aisovereign.ai" class="text-sm text-gray-400 hover:text-white transition">john.kelly@aisovereign.ai</a>
            </div>
        </div>

        <footer class="mt-20 text-[10px] text-gray-700 tracking-[0.4em] uppercase font-bold">
            &copy; 2026 AI SOVEREIGN | SECURE TRANSFER VIA ESCROW
        </footer>
    </main>

</body>
</html>
