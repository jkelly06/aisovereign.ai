<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sovereign | Digital Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fdfdfc; color: #1a1a1a; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass-nav {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .hero-gradient { background: radial-gradient(circle at center, #ffffff 0%, #f9fafb 100%); }
    </style>
</head>
<body class="antialiased">

    <nav class="glass-nav sticky top-0 z-50 py-4">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="logo.jpg" alt="Logo" class="h-10 w-auto">
                <span class="font-bold tracking-tighter text-xl">AI SOVEREIGN</span>
            </div>
            <a href="#contact" class="text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-black transition">Inquire</a>
        </div>
    </nav>

    <main class="hero-gradient pt-20 pb-24 flex flex-col items-center justify-center text-center px-6">
        <img src="logo.jpg" alt="AI Sovereign Logo" class="h-48 md:h-64 w-auto object-contain mb-10">
        
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 text-black">
            The Future of <br><span class="text-gray-400 font-light text-4xl md:text-6xl">Digital Sovereignty</span>
        </h1>
        
        <p class="max-w-2xl text-lg md:text-xl text-gray-600 leading-relaxed mb-12 font-light">
            Architecting secure, autonomous, and intelligent systems. Your data, your agency, your sovereignty.
        </p>

        <div class="h-px w-24 bg-black/10 mb-12"></div>
        
        <a href="mailto:john.kelly@aisovereign.ai" class="text-xl font-light text-black hover:text-gray-500 transition border-b border-black/10 pb-2">
            john.kelly@aisovereign.ai
        </a>
    </main>

    <section id="contact" class="py-24 bg-white border-t border-gray-100">
        <div class="max-w-xl mx-auto px-6">
            <div class="text-center mb-12">
                <h2 class="text-3xl font-bold text-black tracking-tight mb-2">Initialize Contact</h2>
                <p class="text-gray-400 font-light text-sm">Send a direct message to John Kelly.</p>
            </div>

            <form action="https://formspree.io/f/your-form-id" method="POST" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-400 font-bold mb-2">Name</label>
                        <input type="text" name="name" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:border-black outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-400 font-bold mb-2">Email</label>
                        <input type="email" name="email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:border-black outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gray-400 font-bold mb-2">Inquiry Details</label>
                    <textarea name="message" rows="4" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:border-black outline-none transition"></textarea>
                </div>
                <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-lg hover:bg-gray-900 transition shadow-xl shadow-black/10">
                    Send Message
                </button>
            </form>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-gray-50">
        <p class="text-[10px] text-gray-400 tracking-[0.3em] uppercase">
            &copy; 2026 AI SOVEREIGN | John Kelly
        </p>
    </footer>

</body>
</html>
