<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aisovereign.ai is For Sale | Premium AI Domain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, textarea {
            background-color: #121212 !important;
            border: 1px solid #222 !important;
            color: white !important;
        }
        .logo-crop { object-view-box: inset(18% 10% 18% 10%); }
    </style>
</head>
<body class="antialiased">

    <main class="hero-gradient min-h-screen flex flex-col items-center justify-center px-6 py-20">
        <img src="logo.jpg" alt="AI Sovereign Logo" 
            class="logo-crop h-32 md:h-40 w-auto object-contain mb-8 rounded-2xl brightness-110 shadow-[0_0_40px_rgba(255,255,255,0.05)]">

        <div class="inline-block px-4 py-1.5 rounded-full border border-purple-500/30 bg-purple-500/10 text-purple-400 text-xs font-bold tracking-[0.2em] uppercase mb-6">
            Premium Asset Available
        </div>

        <h1 class="text-5xl md:text-8xl font-extrabold tracking-tighter text-center mb-6">
            aisovereign<span class="text-gray-500">.ai</span>
        </h1>
        
        <p class="max-w-2xl text-lg md:text-xl text-gray-400 text-center leading-relaxed mb-12 font-light">
            An elite domain identity for autonomous systems, digital agency, or AI governance. 
            <span class="block mt-2 text-white font-medium italic underline decoration-purple-500/50">Now accepting offers for the domain and brand assets.</span>
        </p>

        <div class="glass-card w-full max-w-lg p-8 md:p-10 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Acquisition Inquiry</h2>
            
            <form action="https://formspree.io/f/your-form-id" method="POST" class="space-y-5">
                <div>
                    <input type="text" name="name" placeholder="Your Name" required class="w-full px-4 py-4 rounded-xl outline-none">
                </div>
                <div>
                    <input type="email" name="email" placeholder="Your Email" required class="w-full px-4 py-4 rounded-xl outline-none">
                </div>
                <div>
                    <textarea name="offer" rows="3" placeholder="Enter your offer or inquiry details..." required class="w-full px-4 py-4 rounded-xl outline-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-white text-black font-bold py-5 rounded-xl hover:bg-gray-200 transition shadow-xl text-lg uppercase tracking-widest">
                    Submit Offer
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-xs text-gray-500 uppercase tracking-widest mb-2">Direct Contact</p>
                <a href="mailto:john.kelly@aisovereign.ai" class="text-gray-300 hover:text-white transition">john.kelly@aisovereign.ai</a>
            </div>
        </div>

        <footer class="mt-20 text-[10px] text-gray-600 tracking-[0.4em] uppercase font-bold">
            &copy; 2026 AI SOVEREIGN | SECURE TRANSFER VIA ESCROW
        </footer>
    </main>

</body>
</html>
