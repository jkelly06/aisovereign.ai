        /* Midnight Matte Background */
        body { 
            background-color: #0a0a0a; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth; 
        }
        
        /* Glassmorphism Navigation */
        .glass-nav {
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Depth Gradient */
        .hero-gradient { 
            background: radial-gradient(circle at center, #161616 0%, #0a0a0a 100%); 
        }

        /* Dark Mode Form Inputs */
        input, textarea {
            background-color: #121212 !important;
            border: 1px solid #222 !important;
            color: white !important;
        }
        input:focus, textarea:focus {
            border-color: #ffffff !important;
            outline: none;
        }

        /* Virtual Crop for Logo Box */
        .logo-crop-nav { object-view-box: inset(12% 12% 12% 12%); }
        .logo-crop-main { object-view-box: inset(18% 10% 18% 10%); }
    </style>
</head>
