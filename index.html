<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sovereign | Digital Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Deep Charcoal/Black background */
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        
        .glass-nav {
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Subtle dark radial gradient for depth */
        .hero-gradient { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); 
        }

        /* Input styling for dark mode */
        input, textarea {
            background-color: #121212 !important;
            border: 1px solid #222 !important;
            color: white !important;
        }
        input:focus, textarea:focus {
            border-color: #444 !important;
        }
    </style>
</head>
<body class="antialiased">

    <nav class="glass-nav sticky top-0 z-50 py-4">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <div class="flex items-center">
                <img src="logo.jpg" alt="AI Sovereign Logo" class="h-16 md:h-20 w-auto object-contain brightness-110">
            </div>
            <a href="#contact" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition border border-gray-800 px-6 py-2 rounded-full hover:bg-white/5">
                Inquire
            </a>
        </div>
    </nav>

    <main class="hero-gradient pt-24 pb-32 flex flex-col items-center justify-center text-center px-6">
        <img src="logo.jpg" alt="AI Sovereign Logo" class="h-64 md:h-80 w-auto object-contain mb-12 brightness-110">
        
        <h1 class="text-5xl md:text-8xl font-extrabold tracking-tight mb-8 text-white">
            The Future of <br><span class="text-gray-500 font-light text-4xl md:text-7xl">Digital Sovereignty</span>
        </h1>
        
        <p class="max-w-2xl text-lg md:text-2xl text-gray-400 leading-relaxed mb-12 font-light">
            Architecting secure, autonomous, and intelligent systems.
        </p>

        <div class="h-px w-32 bg-white/10 mb-12"></div>
        
        <a href="mailto:john.kelly@aisovereign.ai" class="text-2xl font-light text-white hover:text-gray-400 transition-all duration-300">
            john.kelly@aisovereign.ai
        </a>
    </main>

    <section id="contact" class="py-24 bg-[#0a0a0a]">
        <div class="max-w-xl mx-auto px-6">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-bold text-white tracking-tight mb-4">Initialize Contact</h2>
                <p class="text-gray-500 font-light italic text-sm">Secure transmission for sovereign inquiries.</p>
            </div>

            <form action="https://formspree.io/f/your-form-id" method="POST" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 font-bold mb-2">Name</label>
                        <input type="text" name="name" required class="w-full px-4 py-4 rounded-xl outline-none transition shadow-inner">
                    </div>
